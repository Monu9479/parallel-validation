name: os-test

on:
  push:

jobs:
  setup-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - run: pip install pytest flake8

      - run: python --version

      - run: flake8 --version

      - run: pytest --version
